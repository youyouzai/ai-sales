server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sales_star?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate        # 生产用 validate，首次建表用 create 或 update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  sql:
    init:
      mode: never               # schema.sql / data.sql 由手动执行管理

logging:
  level:
    com.salesstar: DEBUG
    org.hibernate.SQL: WARN
